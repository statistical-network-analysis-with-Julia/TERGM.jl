[tolerance]
# CMPLE COEFFICIENTS AND STANDARD ERRORS. edges + nodematch is
# dyad-independent, so the conditional pseudo-likelihood IS the conditional
# likelihood: CMPLE is the exact conditional MLE and both packages are
# maximizing the same strictly-concave logistic likelihood on the same rows.
# No Monte Carlo, no approximation, nothing to average over. The ONLY
# difference two correct implementations can have here is where their
# optimizers stop -- and on this model that difference is measurable, and it
# is R's, not Julia's:
#
#   tergm's CMPLE runs R's `glm` at its default epsilon = 1e-8 and stops
#   there. Against the same glm taken to epsilon = 1e-14, tergm's shipped
#   answer is off by ~1.5e-8 in the coefficients and ~6e-6 in the standard
#   errors (the SEs are the more sensitive of the two, being a function of
#   the fitted probabilities). TERGM.jl's Newton-Raphson lands on the exact
#   optimum and reproduces the tightly-converged R glm to ~1e-10.
#
# So `coefficients`/`std_errors` are compared to tergm AS SHIPPED at a
# tolerance that covers tergm's own optimizer slack -- 1e-6 on the
# coefficients (60x the observed slack) and 1e-4 on the standard errors
# (16x the observed slack, and still 0.13% of the smallest SE in the model,
# far too tight for any real discrepancy to hide under). Widening the SE
# tolerance is not a concession: `exact_std_errors` below is the same
# estimator taken to convergence, and THAT is asserted at 1e-6, where
# TERGM.jl passes with four orders of magnitude to spare. The loose number
# measures R; the tight number measures Julia.
coefficients = 1e-6
std_errors = 1e-4
exact_coefficients = 1e-6
exact_std_errors = 1e-6
#
# BLOCK-BOOTSTRAP STANDARD ERRORS. A bootstrap SE is a random variable: R
# and Julia draw different resamples of the transitions, so they cannot
# agree to machine precision however correct both are. Read
# `boot_se_seed_sd` in [values] first -- that is THIS bootstrap, rerun under
# five further seeds, disagreeing with itself. With only 7 transitions to
# resample the block bootstrap is coarse by construction and that sd is
# large relative to the SE itself; no cross-implementation tolerance can
# sit below it. The tolerance is 3x the largest such sd, which is the
# honest resolution of the comparison. It is deliberately NOT used to make
# a claim the data cannot support: what this checks is that TERGM.jl's
# bootstrap SEs are the same ORDER as R's, not that they are equal.
boot_std_errors = 0.01256

